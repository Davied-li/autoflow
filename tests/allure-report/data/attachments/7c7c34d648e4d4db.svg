<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <text x="40" y="50" font-size="28" font-family="Arial" font-weight="bold">
    AXI-APB Bridge Block Diagram
  </text>

  <!-- AXI Master -->
  <rect x="60" y="220" width="180" height="140" rx="12" ry="12"
        fill="#e8f0fe" stroke="#4a90e2" stroke-width="2"/>
  <text x="105" y="275" font-size="26" font-family="Arial" font-weight="bold">AXI Master</text>
  <text x="95" y="315" font-size="18" font-family="Arial">AW / W / B</text>
  <text x="95" y="345" font-size="18" font-family="Arial">AR / R</text>

  <!-- Bridge -->
  <rect x="360" y="160" width="280" height="260" rx="12" ry="12"
        fill="#fff4e5" stroke="#f5a623" stroke-width="2"/>
  <text x="400" y="205" font-size="28" font-family="Arial" font-weight="bold">AXI-APB Bridge</text>

  <rect x="395" y="235" width="210" height="42" rx="8" ry="8"
        fill="#ffffff" stroke="#f5a623" stroke-width="1.5"/>
  <text x="435" y="262" font-size="18" font-family="Arial">AXI Interface</text>

  <rect x="395" y="295" width="210" height="42" rx="8" ry="8"
        fill="#ffffff" stroke="#f5a623" stroke-width="1.5"/>
  <text x="438" y="322" font-size="18" font-family="Arial">Burst Control</text>

  <rect x="395" y="355" width="210" height="42" rx="8" ry="8"
        fill="#ffffff" stroke="#f5a623" stroke-width="1.5"/>
  <text x="425" y="382" font-size="18" font-family="Arial">Timeout / Error Logic</text>

  <!-- APB Decoder -->
  <rect x="760" y="220" width="200" height="140" rx="12" ry="12"
        fill="#eaf7ea" stroke="#4caf50" stroke-width="2"/>
  <text x="805" y="275" font-size="24" font-family="Arial" font-weight="bold">APB Decoder</text>
  <text x="795" y="315" font-size="18" font-family="Arial">PSEL / PENABLE</text>
  <text x="815" y="345" font-size="18" font-family="Arial">Addr Decode</text>

  <!-- Slaves -->
  <rect x="1010" y="110" width="130" height="70" rx="10" ry="10"
        fill="#f3e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="1040" y="153" font-size="20" font-family="Arial">APB SRAM0</text>

  <rect x="1010" y="220" width="130" height="70" rx="10" ry="10"
        fill="#f3e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="1040" y="263" font-size="20" font-family="Arial">APB SRAM1</text>

  <rect x="1010" y="330" width="130" height="70" rx="10" ry="10"
        fill="#f3e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="1040" y="373" font-size="20" font-family="Arial">APB SRAM2</text>

  <rect x="1010" y="440" width="130" height="70" rx="10" ry="10"
        fill="#f3e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="1040" y="483" font-size="20" font-family="Arial">APB SRAM3</text>

  <!-- Lines -->
  <line x1="240" y1="290" x2="360" y2="290" stroke="black" stroke-width="3"/>
  <polygon points="360,290 348,284 348,296" fill="black"/>

  <line x1="640" y1="290" x2="760" y2="290" stroke="black" stroke-width="3"/>
  <polygon points="760,290 748,284 748,296" fill="black"/>

  <line x1="960" y1="255" x2="1010" y2="145" stroke="black" stroke-width="2.5"/>
  <polygon points="1010,145 998,148 1007,156" fill="black"/>

  <line x1="960" y1="275" x2="1010" y2="255" stroke="black" stroke-width="2.5"/>
  <polygon points="1010,255 998,252 1002,264" fill="black"/>

  <line x1="960" y1="305" x2="1010" y2="365" stroke="black" stroke-width="2.5"/>
  <polygon points="1010,365 1000,357 995,367" fill="black"/>

  <line x1="960" y1="325" x2="1010" y2="475" stroke="black" stroke-width="2.5"/>
  <polygon points="1010,475 1002,464 993,470" fill="black"/>

  <!-- Address Map -->
  <rect x="60" y="520" width="1080" height="120" rx="10" ry="10"
        fill="#fafafa" stroke="#cccccc" stroke-width="1.5"/>
  <text x="90" y="560" font-size="22" font-family="Arial" font-weight="bold">Address Map</text>
  <text x="90" y="595" font-size="18" font-family="Arial">Slave0 : 0x0000 ~ 0x0FFF</text>
  <text x="350" y="595" font-size="18" font-family="Arial">Slave1 : 0x1000 ~ 0x1FFF</text>
  <text x="610" y="595" font-size="18" font-family="Arial">Slave2 : 0x2000 ~ 0x2FFF</text>
  <text x="870" y="595" font-size="18" font-family="Arial">Slave3 : 0x3000 ~ 0x3FFF</text>

  <text x="90" y="625" font-size="16" font-family="Arial" fill="#666666">
    Features: AXI single/burst transfer, multi-slave APB decode, invalid-address handling, PSLVERR propagation, PREADY timeout protection
  </text>
</svg>